name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore basic solution
        run: dotnet restore diffingapi-basic/DiffingApi.Basic.slnx

      - name: Build basic solution
        run: dotnet build diffingapi-basic/DiffingApi.Basic.slnx --no-restore --configuration Release

      - name: Run basic unit tests
        run: dotnet test diffingapi-basic/tests/DiffingApi.UnitTests/DiffingApi.UnitTests.csproj --no-build --configuration Release

      - name: Run basic integration tests
        run: dotnet test diffingapi-basic/tests/DiffingApi.IntegrationTests/DiffingApi.IntegrationTests.csproj --no-build --configuration Release

      - name: Restore advanced solution
        run: dotnet restore diffingapi-advanced/DiffingApi.Advanced.slnx

      - name: Build advanced solution
        run: dotnet build diffingapi-advanced/DiffingApi.Advanced.slnx --no-restore --configuration Release

      - name: Run advanced unit tests
        run: dotnet test diffingapi-advanced/tests/DiffingApi.UnitTests/DiffingApi.UnitTests.csproj --no-build --configuration Release

      - name: Run advanced integration tests
        run: dotnet test diffingapi-advanced/tests/DiffingApi.IntegrationTests/DiffingApi.IntegrationTests.csproj --no-build --configuration Release
