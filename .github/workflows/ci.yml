name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test DiffingApi.UnitTests/DiffingApi.UnitTests.csproj --no-build --configuration Release

      - name: Run integration tests
        run: dotnet test DiffingApi.IntegrationTests/DiffingApi.IntegrationTests.csproj --no-build --configuration Release
